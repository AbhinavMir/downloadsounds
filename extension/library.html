<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YTD DJ — Library</title>
    <link rel="stylesheet" href="library.css" />
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>YTD DJ Library</h1>
        <div id="status" class="status">checking...</div>
      </div>
      <div class="tabs">
        <button class="tab active" data-root="audio">🎵 Audio</button>
        <button class="tab" data-root="video">🎬 Video</button>
        <input type="search" id="filter" placeholder="Filter..." />
        <button id="new-folder" class="toolbtn" title="New folder in this location">+ Folder</button>
        <button id="refresh" class="toolbtn" title="Refresh">↻</button>
      </div>
      <nav id="breadcrumbs" class="breadcrumbs"></nav>
    </header>

    <main id="browser" class="browser">
      <div class="loading">Loading...</div>
    </main>

    <div id="context-menu" class="context-menu hidden"></div>

    <div id="move-modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-title">Move to folder</div>
        <input id="move-input" type="text" placeholder="Type or pick a destination folder" />
        <div id="move-suggestions" class="modal-list"></div>
        <div class="modal-actions">
          <button id="move-cancel">Cancel</button>
          <button id="move-confirm" class="primary">Move</button>
        </div>
      </div>
    </div>

    <div id="resume-toast" class="resume-toast hidden">
      <span id="resume-text"></span>
      <button id="resume-start-over">Start over</button>
    </div>

    <div id="player-bar" class="player-bar hidden">
      <div class="player-info">
        <div id="player-title" class="player-title"></div>
        <div id="player-path" class="player-path"></div>
        <div class="player-hint">Space play/pause · ← → seek 10s</div>
      </div>
      <div class="player-media">
        <audio id="player-audio" controls preload="metadata"></audio>
        <video id="player-video" controls preload="metadata" class="hidden"></video>
      </div>
      <button id="player-close" title="Close">×</button>
    </div>

    <script src="library.js"></script>
  </body>
</html>
